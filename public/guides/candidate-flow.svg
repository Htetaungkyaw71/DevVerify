<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0E1223"/>
  <rect x="40" y="40" width="1120" height="620" rx="20" fill="#161D39" stroke="#32416E"/>
  <text x="80" y="95" fill="#F2F5FF" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">Candidate Journey</text>
  <text x="80" y="130" fill="#AFC0E8" font-size="18" font-family="Inter, Arial, sans-serif">Open invite → Solve challenge → Submit before timer ends</text>

  <rect x="80" y="170" width="1040" height="120" rx="14" fill="#1F2A52" stroke="#4E619B"/>
  <text x="110" y="220" fill="#EAF0FF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Step 1: Open invite link and review challenge list</text>
  <text x="110" y="255" fill="#C8D6FF" font-size="16" font-family="Inter, Arial, sans-serif">You can only open unsolved challenges. Completed ones are locked.</text>

  <rect x="80" y="320" width="1040" height="120" rx="14" fill="#1F2A52" stroke="#4E619B"/>
  <text x="110" y="370" fill="#EAF0FF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Step 2: Start workspace and code in your language</text>
  <text x="110" y="405" fill="#C8D6FF" font-size="16" font-family="Inter, Arial, sans-serif">Use Run to validate tests, then Submit when ready.</text>

  <rect x="80" y="470" width="1040" height="120" rx="14" fill="#1F2A52" stroke="#4E619B"/>
  <text x="110" y="520" fill="#EAF0FF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Step 3: Submission finalizes the challenge</text>
  <text x="110" y="555" fill="#C8D6FF" font-size="16" font-family="Inter, Arial, sans-serif">After submit/timeout, challenge is marked completed and cannot be retaken.</text>
</svg>
